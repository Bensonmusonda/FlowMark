<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowMark</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="titlebar">
    <div id="titlebar-left">
      <button id="menu-btn" title="Menu">&#9776;</button>
      <div id="dropdown" class="hidden">
        <div class="menu-section">
          <button data-action="new">New File <span class="shortcut">Ctrl+N</span></button>
          <button data-action="open">Open File <span class="shortcut">Ctrl+O</span></button>
          <button data-action="quickOpen">Quick Open <span class="shortcut">Ctrl+P</span></button>
          <button data-action="save">Save <span class="shortcut">Ctrl+S</span></button>
          <button data-action="saveAs">Save As <span class="shortcut">Ctrl+Shift+S</span></button>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-section">
          <button data-action="settings">Settings <span class="shortcut">Theme &amp; Colors</span></button>
          <button data-action="zen">Distraction-free <span class="shortcut">F11</span></button>
        </div>
      </div>
    </div>

    <span id="app-name">FlowMark</span>

    <div id="window-controls">
      <button id="btn-min"   title="Minimize">&#8211;</button>
      <button id="btn-max"   title="Maximize">&#9633;</button>
      <button id="btn-close" title="Close">&#10005;</button>
    </div>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel" class="hidden">
    <div id="settings-box">
      <div class="settings-heading">Base Theme</div>
      <div id="theme-options">
        <button class="theme-opt" data-theme="theme-dark">Dark</button>
        <button class="theme-opt" data-theme="theme-light">Light</button>
        <button class="theme-opt" data-theme="theme-sepia">Sepia</button>
      </div>
      <div class="settings-heading">Accent Color</div>
      <div id="accent-options">
        <button class="accent-opt" data-accent="blue"     style="--c:#7cb8f0"></button>
        <button class="accent-opt" data-accent="rose"     style="--c:#f0a0b0"></button>
        <button class="accent-opt" data-accent="sage"     style="--c:#90c8a0"></button>
        <button class="accent-opt" data-accent="peach"    style="--c:#f0b890"></button>
        <button class="accent-opt" data-accent="lavender" style="--c:#b8a8f0"></button>
        <button class="accent-opt" data-accent="sky"      style="--c:#80d0e8"></button>
        <button class="accent-opt" data-accent="sand"     style="--c:#d4b896"></button>
      </div>
    </div>
  </div>

  <!-- Quick open / welcome overlay -->
  <div id="quick-open" class="hidden">
    <div id="quick-open-box">
      <div id="quick-open-actions">
        <button class="qa-btn" data-action="new">
          <span class="qa-label">New File</span>
          <span class="qa-shortcut">Ctrl+N</span>
        </button>
        <button class="qa-btn" data-action="open">
          <span class="qa-label">Open File</span>
          <span class="qa-shortcut">Ctrl+O</span>
        </button>
      </div>
      <div id="quick-open-recents">
        <div id="recents-label">Recent Files</div>
        <ul id="recents-list"></ul>
        <div id="recents-empty" class="hidden">No recent files</div>
      </div>
    </div>
  </div>

  <div id="editor-wrap">
    <div id="welcome">
      <div id="welcome-inner">
        <div id="welcome-logo">FlowMark</div>
        <div id="welcome-actions">
          <button class="wa-btn" data-action="new">
            <span class="wa-label">New File</span>
            <span class="wa-shortcut">Ctrl+N</span>
          </button>
          <button class="wa-btn" data-action="open">
            <span class="wa-label">Open File</span>
            <span class="wa-shortcut">Ctrl+O</span>
          </button>
        </div>
        <div id="welcome-recents">
          <div class="recents-heading">Recent</div>
          <ul id="welcome-recents-list"></ul>
          <div id="welcome-recents-empty" class="hidden">No recent files</div>
        </div>
      </div>
    </div>
    <div id="editor"></div>
  </div>
  <div id="statusbar">
    <span id="word-count"></span>
  </div>

  <script src="editor.bundle.js"></script>
</body>
</html>
